name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch: # Allows you to run it manually

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # Note: Added the --force flag inside the command itself
        run: git push --force https://Ishuuuuu:$HF_TOKEN@huggingface.co/spaces/Ishuuuuu/smart-class main
